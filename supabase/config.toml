# =====================================================
# Supabase local development config
# Run: supabase start
# Region target (production): eu-central-1 (Frankfurt) — set via dashboard
# =====================================================

project_id = "agriflow"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 16

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"
openai_api_key = "env(OPENAI_API_KEY)"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.public]
public = true
file_size_limit = "10MiB"
allowed_mime_types = ["image/jpeg", "image/png", "image/webp", "application/pdf"]
objects_path = "./supabase/storage/public"

[storage.buckets.certifications]
public = false
file_size_limit = "20MiB"
allowed_mime_types = ["application/pdf", "image/jpeg", "image/png"]
objects_path = "./supabase/storage/certifications"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://agriflow.eu", "https://*.vercel.app"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 10
password_requirements = "lower_upper_letters_digits"

[auth.rate_limit]
email_sent = 6
sms_sent = 30
anonymous_users = 30
token_refresh = 150
sign_in_sign_ups = 30
token_verifications = 30

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true
otp_expiry = 600
otp_length = 6

[auth.sms]
enable_signup = false  # we use Twilio Verify directly via API
enable_confirmations = false

[auth.external.google]
enabled = false  # disabled for MVP — magic links + WhatsApp OTP only

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[analytics]
enabled = true
port = 54327
backend = "postgres"

[experimental]
orioledb_version = ""
